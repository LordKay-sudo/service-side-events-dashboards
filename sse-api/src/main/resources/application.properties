spring.application.name=logistics-dashboard-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}
server.error.include-message=always

spring.flyway.enabled=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

dashboards.stream.interval-ms=${DASHBOARD_STREAM_INTERVAL_MS:5000}
dashboards.stream.timeout-ms=${DASHBOARD_STREAM_TIMEOUT_MS:0}
dashboards.stream.heartbeat-ms=${DASHBOARD_STREAM_HEARTBEAT_MS:15000}
dashboards.demo-stream.enabled=${DASHBOARD_DEMO_STREAM_ENABLED:false}
dashboards.demo-stream.interval-ms=${DASHBOARD_DEMO_STREAM_INTERVAL_MS:4000}

logging.level.org.springframework.web=INFO
logging.level.com.logistics.dashboard=DEBUG
