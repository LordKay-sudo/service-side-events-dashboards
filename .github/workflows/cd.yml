name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API metadata
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sse-api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./sse-api
          file: ./sse-api/Dockerfile
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}

      - name: Extract web metadata
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sse-web
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./sse-web
          file: ./sse-web/Dockerfile
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: publish-images
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: staging
    steps:
      - name: Deployment placeholder
        run: |
          echo "Published images to GHCR."
          echo "Add your staging deployment command here."
