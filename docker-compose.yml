version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: logistics-mysql
    environment:
      MYSQL_DATABASE: logistics_dashboards
      MYSQL_USER: logistics
      MYSQL_PASSWORD: logistics
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ulogistics", "-plogistics"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
